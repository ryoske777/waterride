<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>물타기 계산기</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="물타기">
  <meta name="theme-color" content="#0a0a0f">
  <link rel="manifest" href="data:application/json,%7B%22name%22%3A%22%EB%AC%BC%ED%83%80%EA%B8%B0%22%2C%22short_name%22%3A%22%EB%AC%BC%ED%83%80%EA%B8%B0%22%2C%22start_url%22%3A%22.%2F%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%230a0a0f%22%2C%22theme_color%22%3A%22%230a0a0f%22%7D">

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap');

    :root {
      --bg: #0a0a0f;
      --bg2: #111118;
      --bg3: #1a1a24;
      --border: #2a2a38;
      --accent: #00e5a0;
      --accent2: #ff4d6d;
      --accent3: #ffd166;
      --accent-usd: #60a5fa;
      --text: #e8e8f0;
      --text2: #9098b8;   /* label color — brighter than before */
      --text3: #5a607e;
      --card: #13131c;
      --safe: env(safe-area-inset-top);
      --safeb: env(safe-area-inset-bottom);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Sans KR', sans-serif;
      min-height: 100dvh;
      padding-top: max(var(--safe), 16px);
      padding-bottom: max(var(--safeb), 32px);
      overflow-x: hidden;
    }

    /* ── Header ─────────────────────────────────── */
    .header {
      padding: 18px 20px 0;
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 16px;
    }
    .header-left { display: flex; align-items: flex-end; gap: 11px; }
    .header-icon {
      width: 38px; height: 38px;
      background: linear-gradient(135deg, var(--accent) 0%, #00b8d4 100%);
      border-radius: 11px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; flex-shrink: 0; transition: background 0.4s;
    }
    body.usd .header-icon { background: linear-gradient(135deg, var(--accent-usd) 0%, #818cf8 100%); }
    .header-text h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.5px; }
    .header-text p { font-size: 11px; color: var(--text3); margin-top: 1px; font-family: 'Space Mono', monospace; }

    /* Currency toggle */
    .currency-toggle {
      display: flex; background: var(--bg3);
      border: 1px solid var(--border); border-radius: 11px;
      padding: 3px; gap: 2px; flex-shrink: 0;
    }
    .cur-btn {
      padding: 6px 12px; border: none; border-radius: 8px;
      font-family: 'Space Mono', monospace; font-size: 11px; font-weight: 700;
      cursor: pointer; transition: all 0.22s;
      background: transparent; color: var(--text3); letter-spacing: 0.3px;
    }
    .cur-btn.active { background: var(--accent); color: #000; box-shadow: 0 2px 8px rgba(0,229,160,0.3); }
    body.usd .cur-btn.active { background: var(--accent-usd); box-shadow: 0 2px 8px rgba(96,165,250,0.35); }

    /* ── Tab Bar ─────────────────────────────────── */
    .tab-bar-wrap {
      margin: 0 16px 16px;
      display: flex; align-items: center; gap: 8px;
    }
    .tab-scroll {
      flex: 1; display: flex; align-items: center; gap: 6px;
      overflow-x: auto; scrollbar-width: none; -webkit-overflow-scrolling: touch;
      padding-bottom: 2px;
    }
    .tab-scroll::-webkit-scrollbar { display: none; }
    .tab-btn {
      flex-shrink: 0;
      padding: 7px 13px;
      background: var(--bg3); border: 1px solid var(--border);
      border-radius: 10px;
      font-family: 'Space Mono', monospace; font-size: 12px; font-weight: 700;
      color: var(--text3); cursor: pointer;
      transition: all 0.18s; white-space: nowrap;
    }
    .tab-btn.active {
      background: var(--bg2); border-color: var(--accent);
      color: var(--accent);
      box-shadow: 0 0 0 2px rgba(0,229,160,0.12);
    }
    body.usd .tab-btn.active { border-color: var(--accent-usd); color: var(--accent-usd); box-shadow: 0 0 0 2px rgba(96,165,250,0.12); }

    .tab-add-btn {
      flex-shrink: 0; width: 34px; height: 34px;
      background: var(--bg3); border: 1px dashed var(--border);
      border-radius: 10px; color: var(--text3); font-size: 18px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: all 0.18s;
    }
    .tab-add-btn:active { border-color: var(--accent); color: var(--accent); }

    .tab-del-btn {
      flex-shrink: 0; width: 34px; height: 34px;
      background: rgba(255,77,109,0.07); border: 1px solid rgba(255,77,109,0.18);
      border-radius: 10px; color: var(--accent2); font-size: 15px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: all 0.18s;
    }
    .tab-del-btn:active { background: rgba(255,77,109,0.18); }

    /* ── Sections ─────────────────────────────────── */
    .section {
      margin: 0 16px 14px;
      background: var(--card); border: 1px solid var(--border);
      border-radius: 18px; overflow: hidden;
    }
    .section-header {
      padding: 12px 18px;
      display: flex; align-items: center; gap: 9px;
      border-bottom: 1px solid var(--border); background: var(--bg2);
    }
    .section-badge {
      font-family: 'Space Mono', monospace; font-size: 10px; font-weight: 700;
      padding: 3px 8px; border-radius: 6px; letter-spacing: 0.5px;
    }
    .badge-hold { background: rgba(0,229,160,0.12); color: var(--accent); }
    .badge-buy  { background: rgba(255,209,102,0.12); color: var(--accent3); }
    .badge-res  { background: rgba(0,229,160,0.08); color: var(--accent); }
    body.usd .badge-hold, body.usd .badge-res { background: rgba(96,165,250,0.12); color: var(--accent-usd); }
    .section-title { font-size: 12px; font-weight: 500; color: var(--text2); }

    /* ── Input fields ─────────────────────────────── */
    .fields { padding: 14px 18px; display: flex; flex-direction: column; gap: 11px; }
    .field-row { display: flex; gap: 10px; }
    .field { flex: 1; display: flex; flex-direction: column; gap: 5px; }

    /* ▶ Label — brighter */
    .field label {
      font-size: 11px; color: var(--text2); letter-spacing: 0.2px;
      font-family: 'Space Mono', monospace;
    }
    .opt-tag { font-size: 10px; color: var(--text3); }

    .input-wrap { position: relative; display: flex; align-items: center; }
    .input-wrap input {
      width: 100%; background: var(--bg3); border: 1px solid var(--border);
      border-radius: 11px; padding: 11px 38px 11px 13px;
      font-family: 'Space Mono', monospace; font-size: 14px; color: var(--text);
      outline: none; transition: border-color 0.2s, box-shadow 0.2s;
      -webkit-appearance: none;
    }
    .input-wrap input::placeholder { color: var(--text3); font-size: 12px; }
    .input-wrap input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0,229,160,0.08); }
    body.usd .input-wrap input:focus { border-color: var(--accent-usd); box-shadow: 0 0 0 3px rgba(96,165,250,0.08); }
    .input-wrap .unit {
      position: absolute; right: 11px;
      font-size: 10px; color: var(--text3);
      font-family: 'Space Mono', monospace; pointer-events: none;
    }

    /* Add row */
    .add-btn-wrap { padding: 0 18px 14px; }
    .add-btn {
      width: 100%; background: transparent;
      border: 1px dashed var(--border); border-radius: 11px;
      padding: 9px; color: var(--text3); font-size: 12px;
      font-family: 'Noto Sans KR', sans-serif;
      cursor: pointer; transition: all 0.2s;
      display: flex; align-items: center; justify-content: center; gap: 5px;
    }
    .add-btn:active { border-color: var(--accent3); color: var(--accent3); }

    .extra-row { padding: 0 18px 11px; display: flex; gap: 10px; align-items: flex-end; }
    .extra-row .field { flex: 1; }
    .del-btn {
      width: 38px; height: 40px;
      background: rgba(255,77,109,0.08); border: 1px solid rgba(255,77,109,0.2);
      border-radius: 11px; color: var(--accent2); font-size: 15px;
      cursor: pointer; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center; transition: all 0.15s;
    }
    .del-btn:active { background: rgba(255,77,109,0.2); }

    /* Calc Button */
    .calc-wrap { padding: 0 16px 14px; }
    .calc-btn {
      width: 100%; background: linear-gradient(135deg, var(--accent) 0%, #00c9a0 100%);
      border: none; border-radius: 15px; padding: 15px;
      font-family: 'Noto Sans KR', sans-serif; font-size: 15px; font-weight: 700;
      color: #000; cursor: pointer; letter-spacing: 0.3px;
      transition: opacity 0.15s, transform 0.1s, background 0.4s, box-shadow 0.4s;
      box-shadow: 0 4px 20px rgba(0,229,160,0.22);
    }
    body.usd .calc-btn { background: linear-gradient(135deg, var(--accent-usd) 0%, #818cf8 100%); box-shadow: 0 4px 20px rgba(96,165,250,0.22); }
    .calc-btn:active { opacity: 0.8; transform: scale(0.99); }

    /* ── Result section ──────────────────────────── */
    .result-section {
      margin: 0 16px 14px; background: var(--card);
      border: 1px solid var(--border); border-radius: 18px;
      overflow: hidden; display: none;
    }
    .result-section.visible { display: block; }
    .result-header {
      padding: 12px 18px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--border); background: var(--bg2);
    }
    .result-header-left { display: flex; align-items: center; gap: 9px; }
    .cur-pill {
      font-family: 'Space Mono', monospace; font-size: 10px; font-weight: 700;
      padding: 3px 8px; border-radius: 6px;
      background: rgba(255,209,102,0.12); color: var(--accent3); transition: all 0.3s;
    }
    body.usd .cur-pill { background: rgba(96,165,250,0.12); color: var(--accent-usd); }

    .result-grid {
      padding: 16px 16px 4px;
      display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
    }
    .result-card {
      background: var(--bg3); border: 1px solid var(--border);
      border-radius: 13px; padding: 12px 14px;
    }
    .result-card.highlight {
      border-color: rgba(0,229,160,0.28);
      background: linear-gradient(135deg, rgba(0,229,160,0.05) 0%, var(--bg3) 100%);
    }
    body.usd .result-card.highlight {
      border-color: rgba(96,165,250,0.28);
      background: linear-gradient(135deg, rgba(96,165,250,0.05) 0%, var(--bg3) 100%);
    }

    /* ▶ Result labels — same style as field labels */
    .result-label {
      font-size: 11px; color: var(--text2);
      font-family: 'Space Mono', monospace; letter-spacing: 0.2px;
      margin-bottom: 7px;
    }
    /* ▶ Result values — consistent with input value size */
    .result-value {
      font-family: 'Space Mono', monospace;
      font-size: 14px; font-weight: 700; color: var(--text); line-height: 1.2;
      word-break: break-all;
    }
    .result-value.big { font-size: 17px; }
    .result-value.accent { color: var(--accent); }
    body.usd .result-value.accent { color: var(--accent-usd); }
    .result-value.red { color: var(--accent2); }
    .result-value.yellow { color: var(--accent3); }
    /* ▶ Sub text — same color as label */
    .result-sub { margin-top: 4px; font-size: 11px; color: var(--text2); font-family: 'Space Mono', monospace; }

    /* Rate bar */
    .rate-bar-wrap { padding: 14px 18px 16px; }
    .rate-bar-labels {
      display: flex; justify-content: space-between;
      font-size: 10px; color: var(--text2);
      font-family: 'Space Mono', monospace; margin-bottom: 6px;
    }
    .rate-bar-track {
      height: 5px; background: var(--bg3);
      border-radius: 99px; overflow: hidden; border: 1px solid var(--border);
    }
    .rate-bar-fill {
      height: 100%; border-radius: 99px;
      background: linear-gradient(90deg, var(--accent2), var(--accent3), var(--accent));
      transition: width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    body.usd .rate-bar-fill { background: linear-gradient(90deg, var(--accent2), var(--accent3), var(--accent-usd)); }
    .rate-status {
      text-align: center; margin-top: 6px;
      font-family: 'Space Mono', monospace; font-size: 11px; color: var(--text2);
    }

    /* Breakeven */
    .breakeven-section { padding: 0 16px 16px; }
    .breakeven-title {
      font-size: 11px; color: var(--text2);
      font-family: 'Space Mono', monospace; letter-spacing: 0.2px; margin-bottom: 9px;
    }
    .breakeven-rows { display: flex; flex-direction: column; gap: 5px; }
    .breakeven-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 8px 11px;
      background: var(--bg3); border: 1px solid var(--border); border-radius: 9px;
    }
    .be-label { font-size: 11px; color: var(--text2); }
    .be-val {
      font-family: 'Space Mono', monospace; font-size: 12px; font-weight: 700;
      color: var(--accent3); text-align: right; max-width: 56%;
    }

    /* Reset */
    .reset-wrap { padding: 0 16px 8px; }
    .reset-btn {
      width: 100%; background: transparent; border: 1px solid var(--border);
      border-radius: 13px; padding: 11px; color: var(--text3);
      font-family: 'Noto Sans KR', sans-serif; font-size: 13px;
      cursor: pointer; transition: all 0.2s;
    }
    .reset-btn:active { border-color: var(--accent2); color: var(--accent2); }

    /* Custom Alert Modal */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.7);
      display: flex; align-items: center; justify-content: center;
      z-index: 999; padding: 24px;
      opacity: 0; pointer-events: none; transition: opacity 0.2s;
    }
    .modal-overlay.show { opacity: 1; pointer-events: all; }
    .modal-box {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 18px; padding: 24px 20px;
      width: 100%; max-width: 320px;
      transform: translateY(12px); transition: transform 0.25s;
    }
    .modal-overlay.show .modal-box { transform: translateY(0); }
    .modal-title { font-size: 15px; font-weight: 700; color: var(--text); margin-bottom: 8px; }
    .modal-msg { font-size: 13px; color: var(--text2); line-height: 1.6; margin-bottom: 20px; }
    .modal-btns { display: flex; gap: 8px; }
    .modal-btn {
      flex: 1; padding: 12px; border-radius: 12px;
      font-family: 'Noto Sans KR', sans-serif; font-size: 14px; font-weight: 600;
      cursor: pointer; border: none; transition: opacity 0.15s;
    }
    .modal-btn:active { opacity: 0.75; }
    .modal-btn.primary { background: var(--accent); color: #000; }
    body.usd .modal-btn.primary { background: var(--accent-usd); }
    .modal-btn.secondary { background: var(--bg3); color: var(--text2); border: 1px solid var(--border); }
    .modal-btn.danger { background: var(--accent2); color: #fff; }

    @keyframes fadeUp { from { opacity:0; transform:translateY(14px); } to { opacity:1; transform:translateY(0); } }
    .result-section.visible { animation: fadeUp 0.3s ease; }

    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
    input[type=number] { -moz-appearance: textfield; }
  </style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="header-left">
    <div class="header-icon">📉</div>
    <div class="header-text">
      <h1>물타기 계산기</h1>
      <p id="header-sub">KRW · AVERAGING DOWN</p>
    </div>
  </div>
  <div class="currency-toggle">
    <button class="cur-btn active" id="btn-krw" onclick="setCurrency('krw')">₩ 원</button>
    <button class="cur-btn"        id="btn-usd" onclick="setCurrency('usd')">$ USD</button>
  </div>
</div>

<!-- Tab Bar -->
<div class="tab-bar-wrap">
  <div class="tab-scroll" id="tab-scroll"></div>
  <button class="tab-add-btn" id="tab-add-btn" title="새 날짜 추가">＋</button>
  <button class="tab-del-btn" id="tab-del-btn" title="현재 탭 삭제">🗑</button>
</div>

<!-- 현재 보유 -->
<div class="section" id="section-hold">
  <div class="section-header">
    <span class="section-badge badge-hold">HOLD</span>
    <span class="section-title">현재 보유 중인 주식</span>
  </div>
  <div class="fields">
    <div class="field-row">
      <div class="field">
        <label>평균 매수가</label>
        <div class="input-wrap">
          <input type="number" id="hold_price" placeholder="50000" inputmode="decimal">
          <span class="unit price-unit">원</span>
        </div>
      </div>
      <div class="field">
        <label>보유 수량</label>
        <div class="input-wrap">
          <input type="number" id="hold_qty" placeholder="100" inputmode="decimal">
          <span class="unit">주</span>
        </div>
      </div>
    </div>
    <div class="field">
      <label>현재 주가 <span class="opt-tag">(선택)</span></label>
      <div class="input-wrap">
        <input type="number" id="current_price" placeholder="42000" inputmode="decimal">
        <span class="unit price-unit">원</span>
      </div>
    </div>
  </div>
</div>

<!-- 추가 매수 -->
<div class="section">
  <div class="section-header">
    <span class="section-badge badge-buy">BUY</span>
    <span class="section-title">추가 매수 (물타기)</span>
  </div>
  <div class="fields" id="buy-rows">
    <div class="field-row" data-idx="0">
      <div class="field">
        <label>매수가</label>
        <div class="input-wrap">
          <input type="number" class="buy-price" placeholder="40000" inputmode="decimal">
          <span class="unit price-unit">원</span>
        </div>
      </div>
      <div class="field">
        <label>수량</label>
        <div class="input-wrap">
          <input type="number" class="buy-qty" placeholder="50" inputmode="decimal">
          <span class="unit">주</span>
        </div>
      </div>
    </div>
  </div>
  <div class="add-btn-wrap">
    <button class="add-btn" id="add-row-btn">＋ 매수 회차 추가</button>
  </div>
</div>

<!-- 계산 -->
<div class="calc-wrap">
  <button class="calc-btn" id="calc-btn">계산하기</button>
</div>

<!-- 결과 -->
<div class="result-section" id="result-section">
  <div class="result-header">
    <div class="result-header-left">
      <span class="section-badge badge-res">RESULT</span>
      <span class="section-title">계산 결과</span>
    </div>
    <span class="cur-pill" id="result-cur-pill">KRW</span>
  </div>
  <div class="result-grid">
    <div class="result-card highlight">
      <div class="result-label">물타기 후 평단가</div>
      <div class="result-value big accent" id="res-avg">—</div>
      <div class="result-sub" id="res-avg-change"></div>
    </div>
    <div class="result-card">
      <div class="result-label">총 보유 수량</div>
      <div class="result-value" id="res-total-qty">—</div>
      <div class="result-sub" id="res-qty-add"></div>
    </div>
    <div class="result-card">
      <div class="result-label">총 투자금액</div>
      <div class="result-value yellow" id="res-total-invest">—</div>
    </div>
    <div class="result-card">
      <div class="result-label">현재 평가액</div>
      <div class="result-value" id="res-eval">—</div>
      <div class="result-sub" id="res-pl"></div>
    </div>
  </div>
  <div class="rate-bar-wrap">
    <div class="rate-bar-labels"><span>손절</span><span>평단가</span><span>수익</span></div>
    <div class="rate-bar-track"><div class="rate-bar-fill" id="rate-bar" style="width:50%"></div></div>
    <div class="rate-status" id="rate-text"></div>
  </div>
  <div class="breakeven-section">
    <div class="breakeven-title">손익분기 정보</div>
    <div class="breakeven-rows">
      <div class="breakeven-row">
        <span class="be-label">📌 손익분기점 (평단가)</span>
        <span class="be-val" id="be-breakeven">—</span>
      </div>
      <div class="breakeven-row">
        <span class="be-label">💸 원금 회복 수익률</span>
        <span class="be-val" id="be-recover">—</span>
      </div>
      <div class="breakeven-row">
        <span class="be-label">📉 현재 손실률</span>
        <span class="be-val" id="be-loss" style="color:var(--accent2)">—</span>
      </div>
      <div class="breakeven-row">
        <span class="be-label">💰 추가 투자금액</span>
        <span class="be-val" id="be-added">—</span>
      </div>
    </div>
  </div>
</div>

<div class="reset-wrap" id="reset-wrap" style="display:none">
  <button class="reset-btn" id="reset-btn">↺ 현재 탭 초기화</button>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal-box">
    <div class="modal-title" id="modal-title"></div>
    <div class="modal-msg" id="modal-msg"></div>
    <div class="modal-btns" id="modal-btns"></div>
  </div>
</div>

<script>
// ── Service Worker ──────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  const sw = `const C='sv3';self.addEventListener('install',e=>e.waitUntil(caches.open(C).then(c=>c.addAll(['./','.\/index.html']))));self.addEventListener('fetch',e=>e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request))));`;
  navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw],{type:'application/javascript'}))).catch(()=>{});
}

// ── Storage helpers (localStorage — works locally & on server) ──
function saveCookie(data) {
  try { localStorage.setItem('stockAvg_v3', JSON.stringify(data)); } catch(e) {}
}
function loadCookie() {
  try {
    const raw = localStorage.getItem('stockAvg_v3');
    return raw ? JSON.parse(raw) : null;
  } catch(e) { return null; }
}

// ── Currency config ─────────────────────────────────────────────
const CUR = {
  krw: {
    unit:'원', ph_price:'50000', ph_buy:'40000', ph_cur:'42000',
    fmt: n => Math.round(n).toLocaleString('ko-KR')+'원',
    fmtD: n => (n>=0?'+':'')+Math.round(n).toLocaleString('ko-KR')+'원',
    sub:'KRW · AVERAGING DOWN', pill:'KRW',
  },
  usd: {
    unit:'$', ph_price:'150.00', ph_buy:'130.00', ph_cur:'135.00',
    fmt: n => '$'+n.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}),
    fmtD: n => (n>=0?'+$':'-$')+Math.abs(n).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}),
    sub:'USD · AVERAGING DOWN', pill:'USD',
  },
};
let currency = 'krw';

// ── State ───────────────────────────────────────────────────────
// tabs: [{label, currency, holdPrice, holdQty, curPrice, buys:[{price,qty}]}]
let state = { tabs:[], active:0 };

function getToday() {
  const d = new Date();
  return `${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`;
}

function newTab(label, cur) {
  return { label, currency: cur||'krw', holdPrice:'', holdQty:'', curPrice:'', buys:[{price:'',qty:''}] };
}

function initState() {
  const saved = loadCookie();
  if (saved && saved.tabs && saved.tabs.length > 0) {
    state = saved;
    if (state.active >= state.tabs.length) state.active = state.tabs.length - 1;
    // restore last used currency before loading tab UI
    if (state.lastCurrency) {
      currency = state.lastCurrency;
      applyUIForCurrency();
    }
  } else {
    state = { tabs: [newTab(getToday())], active: 0 };
    saveCookie(state);
  }
  renderTabs();
  loadTab(state.active);
}

// ── Tab rendering ───────────────────────────────────────────────
function renderTabs() {
  const scroll = document.getElementById('tab-scroll');
  scroll.innerHTML = '';
  state.tabs.forEach((t, i) => {
    const btn = document.createElement('button');
    btn.className = 'tab-btn' + (i === state.active ? ' active' : '');
    btn.textContent = t.label;
    btn.addEventListener('click', () => switchTab(i));
    scroll.appendChild(btn);
  });
  // scroll active into view
  setTimeout(() => {
    const active = scroll.querySelector('.tab-btn.active');
    if (active) active.scrollIntoView({ behavior:'smooth', block:'nearest', inline:'nearest' });
  }, 50);
}

// ── Tab switching ───────────────────────────────────────────────
function switchTab(idx) {
  saveCurrentInputsToTab(state.active); // auto-save current before switching
  state.active = idx;
  saveCookie(state);
  renderTabs();
  loadTab(idx);
  hideResult();
}

function saveCurrentInputsToTab(idx) {
  const tab = state.tabs[idx];
  if (!tab) return;
  tab.holdPrice = document.getElementById('hold_price').value;
  tab.holdQty   = document.getElementById('hold_qty').value;
  tab.curPrice  = document.getElementById('current_price').value;
  tab.currency  = currency;

  const prices = document.querySelectorAll('.buy-price');
  const qtys   = document.querySelectorAll('.buy-qty');
  tab.buys = [];
  for (let i = 0; i < prices.length; i++) {
    tab.buys.push({ price: prices[i].value, qty: qtys[i] ? qtys[i].value : '' });
  }
}

function loadTab(idx) {
  const tab = state.tabs[idx];
  if (!tab) return;

  // Set currency first
  if (tab.currency && tab.currency !== currency) {
    currency = tab.currency;
    applyUIForCurrency();
  }

  // Fill inputs
  document.getElementById('hold_price').value   = tab.holdPrice || '';
  document.getElementById('hold_qty').value     = tab.holdQty || '';
  document.getElementById('current_price').value = tab.curPrice || '';

  // Clear and rebuild buy rows
  document.querySelectorAll('.extra-row').forEach(r => r.remove());
  const firstRow = document.querySelector('#buy-rows .field-row[data-idx="0"]');
  const buys = tab.buys && tab.buys.length > 0 ? tab.buys : [{price:'',qty:''}];

  // first row
  firstRow.querySelector('.buy-price').value = buys[0].price || '';
  firstRow.querySelector('.buy-qty').value   = buys[0].qty   || '';

  // extra rows
  rowCount = 1;
  for (let i = 1; i < buys.length; i++) {
    addRowWithValues(buys[i].price, buys[i].qty);
  }
}

// ── Add Row ─────────────────────────────────────────────────────
let rowCount = 1;

document.getElementById('add-row-btn').addEventListener('click', () => {
  addRowWithValues('', '');
});

function addRowWithValues(priceVal, qtyVal) {
  rowCount++;
  const c = CUR[currency];
  const wrap = document.createElement('div');
  wrap.className = 'extra-row';
  wrap.innerHTML = `
    <div class="field">
      <label>매수가 #${rowCount}</label>
      <div class="input-wrap">
        <input type="number" class="buy-price" placeholder="${c.ph_buy}" inputmode="decimal" value="${priceVal}">
        <span class="unit price-unit">${c.unit}</span>
      </div>
    </div>
    <div class="field">
      <label>수량</label>
      <div class="input-wrap">
        <input type="number" class="buy-qty" placeholder="50" inputmode="decimal" value="${qtyVal}">
        <span class="unit">주</span>
      </div>
    </div>
    <button class="del-btn" onclick="this.parentElement.remove()">✕</button>
  `;
  document.getElementById('add-row-btn').parentElement.before(wrap);
}

// ── Tab Add ─────────────────────────────────────────────────────
document.getElementById('tab-add-btn').addEventListener('click', () => {
  if (state.tabs.length >= 5) {
    showModal('탭 최대치 도달', '최대 5개의 날짜 탭을 사용할 수 있습니다.\n기존 탭을 삭제 후 추가해 주세요.', [
      { label:'확인', cls:'primary', cb: closeModal },
    ]); return;
  }
  const today = getToday();
  const existing = state.tabs.filter(t => t.label === today || t.label.startsWith(today+'('));
  if (existing.length > 0) {
    showModal(
      '오늘 날짜가 이미 존재합니다',
      `${today} 탭이 이미 있습니다.\n추가로 생성하시겠습니까?`,
      [
        { label:'추가 생성', cls:'primary', cb: () => { closeModal(); createTab(today, existing.length); } },
        { label:'아니요',    cls:'secondary', cb: closeModal },
      ]
    );
  } else {
    createTab(today, 0);
  }
});

function createTab(base, dupCount) {
  saveCurrentInputsToTab(state.active);
  const label = dupCount > 0 ? `${base}(${dupCount})` : base;
  state.tabs.push(newTab(label, currency));
  state.active = state.tabs.length - 1;
  saveCookie(state);
  renderTabs();
  loadTab(state.active);
  hideResult();
}

// ── Tab Delete ──────────────────────────────────────────────────
document.getElementById('tab-del-btn').addEventListener('click', () => {
  if (state.tabs.length <= 1) {
    showModal('삭제 불가', '마지막 탭은 삭제할 수 없습니다.', [
      { label:'확인', cls:'primary', cb: closeModal }
    ]); return;
  }
  const label = state.tabs[state.active].label;
  showModal(
    '탭 삭제',
    `[${label}] 탭을 삭제하시겠습니까?\n저장된 데이터가 모두 사라집니다.`,
    [
      { label:'삭제', cls:'danger', cb: () => { closeModal(); deleteActiveTab(); } },
      { label:'아니요', cls:'secondary', cb: closeModal },
    ]
  );
});

function deleteActiveTab() {
  state.tabs.splice(state.active, 1);
  state.active = Math.max(0, state.active - 1);
  saveCookie(state);
  renderTabs();
  loadTab(state.active);
  hideResult();
}

// ── Currency ────────────────────────────────────────────────────
function setCurrency(cur) {
  currency = cur;
  applyUIForCurrency();
  hideResult();
  state.tabs[state.active].currency = cur;
  state.lastCurrency = cur;  // remember globally for next open
  saveCookie(state);
}

function applyUIForCurrency() {
  const c = CUR[currency];
  document.getElementById('btn-krw').classList.toggle('active', currency==='krw');
  document.getElementById('btn-usd').classList.toggle('active', currency==='usd');
  document.body.classList.toggle('usd', currency==='usd');
  document.getElementById('header-sub').textContent = c.sub;
  document.getElementById('result-cur-pill').textContent = c.pill;
  document.querySelectorAll('.price-unit').forEach(el => el.textContent = c.unit);
  document.getElementById('hold_price').placeholder = c.ph_price;
  document.getElementById('current_price').placeholder = c.ph_cur;
  document.querySelectorAll('.buy-price').forEach(el => el.placeholder = c.ph_buy);
}

// ── Calculate ───────────────────────────────────────────────────
const fmtN = n => n.toLocaleString('ko-KR')+'주';
const pct  = n => (n>=0?'+':'')+n.toFixed(2)+'%';

document.getElementById('calc-btn').addEventListener('click', calculate);

function calculate() {
  const c = CUR[currency];
  const holdPrice = parseFloat(document.getElementById('hold_price').value);
  const holdQty   = parseFloat(document.getElementById('hold_qty').value);
  const curPrice  = parseFloat(document.getElementById('current_price').value)||null;

  if (!holdPrice||!holdQty||holdPrice<=0||holdQty<=0) {
    shake(document.getElementById('section-hold')); return;
  }

  let addedCost=0, addedQty=0;
  const bPrices = document.querySelectorAll('.buy-price');
  const bQtys   = document.querySelectorAll('.buy-qty');
  bPrices.forEach((el,i)=>{
    const p=parseFloat(el.value), q=parseFloat(bQtys[i]?.value);
    if(p>0&&q>0){addedCost+=p*q;addedQty+=q;}
  });

  const totalQty  = holdQty+addedQty;
  const totalCost = holdPrice*holdQty+addedCost;
  const newAvg    = totalCost/totalQty;
  const evalAmt   = curPrice?curPrice*totalQty:null;
  const pl        = evalAmt!==null?evalAmt-totalCost:null;
  const plRate    = pl!==null?(pl/totalCost)*100:null;
  const avgChg    = ((newAvg-holdPrice)/holdPrice)*100;
  const recRate   = curPrice?((newAvg-curPrice)/curPrice)*100:null;
  const lossRate  = curPrice?((curPrice-holdPrice)/holdPrice)*100:null;

  // Save to cookie
  saveCurrentInputsToTab(state.active);
  saveCookie(state);

  // Results
  document.getElementById('res-avg').textContent = c.fmt(newAvg);
  document.getElementById('res-avg-change').textContent = '기존 평단 대비 '+pct(avgChg);
  document.getElementById('res-total-qty').textContent = fmtN(totalQty);
  document.getElementById('res-qty-add').textContent = addedQty>0?`+${addedQty.toLocaleString()}주 추가`:'추가 없음';
  document.getElementById('res-total-invest').textContent = c.fmt(totalCost);

  if (evalAmt!==null) {
    document.getElementById('res-eval').textContent = c.fmt(evalAmt);
    const plEl = document.getElementById('res-pl');
    plEl.textContent = (pl>=0?'▲ ':'▼ ')+c.fmtD(pl)+' ('+pct(plRate)+')';
    plEl.style.color = pl>=0?(currency==='usd'?'var(--accent-usd)':'var(--accent)'):'var(--accent2)';
    document.getElementById('res-eval').className = 'result-value '+(pl>=0?'accent':'red');
    const ratio = Math.min(Math.max((curPrice/newAvg)*50,0),100);
    document.getElementById('rate-bar').style.width = ratio+'%';
    document.getElementById('rate-text').textContent = curPrice>=newAvg?'📈 평단가 위 (수익 구간)':'📉 평단가 아래 (손실 구간)';
    document.getElementById('rate-text').style.color = curPrice>=newAvg?(currency==='usd'?'var(--accent-usd)':'var(--accent)'):'var(--accent2)';
  } else {
    document.getElementById('res-eval').textContent = '—';
    document.getElementById('res-pl').textContent = '현재가 입력 시 표시';
    document.getElementById('rate-bar').style.width = '50%';
    document.getElementById('rate-text').textContent = '';
  }

  document.getElementById('be-breakeven').textContent = c.fmt(newAvg);
  document.getElementById('be-recover').textContent = recRate!==null?pct(Math.abs(recRate))+' 상승 필요':'현재가 입력 필요';
  document.getElementById('be-loss').textContent = lossRate!==null?pct(lossRate):'현재가 입력 필요';
  document.getElementById('be-added').textContent = addedQty>0?c.fmt(addedCost):'추가 매수 없음';

  const rs = document.getElementById('result-section');
  rs.classList.remove('visible'); void rs.offsetWidth;
  rs.classList.add('visible');
  document.getElementById('reset-wrap').style.display = 'block';
  setTimeout(()=>rs.scrollIntoView({behavior:'smooth',block:'start'}),100);
}

// ── Reset ───────────────────────────────────────────────────────
document.getElementById('reset-btn').addEventListener('click',()=>{
  document.querySelectorAll('input').forEach(i=>i.value='');
  document.querySelectorAll('.extra-row').forEach(r=>r.remove());
  rowCount=1;
  saveCurrentInputsToTab(state.active);
  saveCookie(state);
  hideResult();
  window.scrollTo({top:0,behavior:'smooth'});
});

function hideResult() {
  document.getElementById('result-section').classList.remove('visible');
  document.getElementById('reset-wrap').style.display='none';
}

// ── Modal ────────────────────────────────────────────────────────
function showModal(title, msg, btns) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-msg').textContent = msg;
  const bc = document.getElementById('modal-btns');
  bc.innerHTML = '';
  btns.forEach(b => {
    const el = document.createElement('button');
    el.className = 'modal-btn '+b.cls;
    el.textContent = b.label;
    el.addEventListener('click', b.cb);
    bc.appendChild(el);
  });
  document.getElementById('modal').classList.add('show');
}
function closeModal() {
  document.getElementById('modal').classList.remove('show');
}
document.getElementById('modal').addEventListener('click', e => {
  if (e.target === document.getElementById('modal')) closeModal();
});

// ── Shake ────────────────────────────────────────────────────────
function shake(el) {
  const frames=[0,-8,8,-6,6,-3,3,0]; let i=0;
  el.style.transition='transform 0.05s';
  const t=setInterval(()=>{
    el.style.transform=`translateX(${frames[i++]}px)`;
    if(i>=frames.length){clearInterval(t);el.style.transform='';}
  },40);
}

document.addEventListener('keydown',e=>{if(e.key==='Enter')calculate();});

// ── Init ─────────────────────────────────────────────────────────
initState();
</script>
</body>
</html>
